name: Plugin Review Settimanale

on:
  schedule:
    # Ogni sabato alle 15:34 ora italiana (CEST = UTC+2 → 13:34 UTC)
    - cron: "34 13 * * 6"
  workflow_dispatch:  # permette esecuzione manuale

jobs:
  plugin-review:
    name: Genera Report Plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: |
          pip install google-auth google-auth-httplib2 google-api-python-client

      - name: Esegui Plugin Review
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          python scripts/plugin_review_runner.py

      - name: Commit e push del report
        run: |
          git config user.name "Claude Code Bot"
          git config user.email "bot@claude.ai"
          git add reports/
          git diff --staged --quiet || git commit -m "report: plugin review settimanale $(date +%Y-%m-%d)"
          git push
